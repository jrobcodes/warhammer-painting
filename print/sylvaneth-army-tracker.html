<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sylvaneth Outcasts — Army Tracker</title>
<style>
  @page { size: letter; margin: 0.5in; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #fff; color: #1a1a1a;
    font-size: 9pt; line-height: 1.35;
  }

  .tier-page {
    page-break-after: always;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  .tier-page:last-child { page-break-after: auto; }

  .tier-header {
    text-align: center;
    border-bottom: 3px solid #222;
    padding-bottom: 6px;
    margin-bottom: 10px;
  }
  .tier-title {
    font-size: 20pt;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .tier-subtitle {
    font-size: 10pt;
    color: #555;
    margin-top: 2px;
  }

  .roster-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 10px;
  }
  .roster-table th {
    background: #222;
    color: #fff;
    padding: 5px 8px;
    text-align: left;
    font-size: 8pt;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .roster-table th:first-child { border-radius: 4px 0 0 0; }
  .roster-table th:last-child { border-radius: 0 4px 0 0; }

  .roster-table td {
    padding: 6px 8px;
    border-bottom: 1px solid #ddd;
    vertical-align: middle;
  }
  .roster-table tr:nth-child(even) td {
    background: #f9f9f9;
  }
  .roster-table tr:last-child td {
    border-bottom: 2px solid #222;
  }

  .unit-img {
    width: 80px;
    height: 60px;
    object-fit: contain;
    border-radius: 4px;
    background: #f0f0f0;
    border: 1px solid #ddd;
    display: block;
  }

  .unit-name {
    font-weight: 700;
    font-size: 10pt;
  }

  .tag {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 7.5pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .tag-own { background: #1565c0; color: #fff; }
  .tag-buy { background: #c62828; color: #fff; }

  .status-boxes {
    display: flex;
    gap: 6px;
    flex-wrap: nowrap;
  }
  .status-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    font-size: 6.5pt;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .check-box {
    display: block;
    width: 16px; height: 16px;
    border: 1.5px solid #555;
    border-radius: 2px;
  }
  .check-box.checked {
    background: #222;
    position: relative;
  }
  .check-box.checked::after {
    content: '\2713';
    color: #fff;
    font-size: 11px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    line-height: 1;
  }

  .tier-totals {
    margin-top: auto;
    padding-top: 8px;
    border-top: 2.5px solid #222;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11pt;
    font-weight: 700;
  }
  .tier-totals .running {
    font-size: 9pt;
    font-weight: 600;
    color: #555;
  }
  .total-pts {
    font-size: 14pt;
    color: #222;
  }
  .total-models {
    font-size: 10pt;
    color: #444;
  }

  @media print {
    body { padding: 0; }
    .tier-page { height: auto; }
  }
</style>
</head>
<body>

<script>
const allUnits = [
  // 1000pt tier
  { name:'Treelord Ancient', count:1, pts:280, own:'OWN', src:'Start Collecting', painted:false,
    img:'https://www.warhammer.com/app/resources/catalog/product/920x950/99120204013_SylvanethTreelordAncient01.jpg' },
  { name:'Branchwych', count:1, pts:100, own:'OWN', src:'Start Collecting', painted:false,
    img:'https://www.warhammer.com/app/resources/catalog/product/threeSixty/99070204002_SylvanethBranchwych360/01-01.jpg' },
  { name:'Dryads x10 (Painted)', count:10, pts:90, own:'OWN', src:'Start Collecting', painted:true,
    img:'https://www.warhammer.com/app/resources/catalog/product/920x950/99120204012_SylvanethDryads01.jpg' },
  { name:'Dryads x10', count:10, pts:90, own:'OWN', src:'Start Collecting', painted:false,
    img:'https://www.warhammer.com/app/resources/catalog/product/920x950/99120204012_SylvanethDryads01.jpg' },
  { name:'Kurnoth Hunters x3 (Greatbows)', count:3, pts:200, own:'OWN', src:'Echoes of Doom', painted:false,
    img:'https://www.warhammer.com/app/resources/catalog/product/920x950/99120204018_KurnothHunters01.jpg' },
  { name:'Revenant Seekers x3', count:3, pts:180, own:'OWN', src:'Blades of Belthanos', painted:false,
    img:'https://www.warhammer.com/app/resources/catalog/product/920x950/99120204031_RevenantSeekersFeature01.jpg' },
  { name:'Spite-Revenants x5', count:5, pts:80, own:'OWN', src:'Tree Revenants kit', painted:false,
    img:'https://www.warhammer.com/app/resources/catalog/product/920x950/99120204016_SpiteRevenant01.jpg' },

  // 2000pt additions
  { name:'The Lady of Vines', count:1, pts:280, own:'OWN', src:'Echoes of Doom', painted:false,
    img:'https://www.warhammer.com/app/resources/catalog/product/920x950/99120204034_SYLLadyofVinesLead.jpg' },
  { name:'Kurnoth Hunters x3 (Greatswords)', count:3, pts:200, own:'OWN', src:'Blades of Belthanos', painted:false,
    img:'https://www.warhammer.com/app/resources/catalog/product/920x950/99120204018_KurnothHunters01.jpg' },
  { name:'Drycha Hamadreth', count:1, pts:250, own:'OWN', src:'Separate purchase', painted:false,
    img:'https://www.warhammer.com/app/resources/catalog/product/920x950/99120204017_DrycaHamadreth01.jpg' },
  { name:'Spiterider Lancers x3', count:3, pts:220, own:'OWN', src:'Separate purchase', painted:false,
    img:'https://www.warhammer.com/app/resources/catalog/product/920x950/99120204031_SpiteriderLancersLead.jpg' },
  { name:'Gossamid Archers x5', count:5, pts:120, own:'OWN', src:'Echoes of Doom', painted:false,
    img:'https://www.warhammer.com/app/resources/catalog/product/920x950/99120204032_GossamidArchersLead.jpg' },
];

const tier1000 = allUnits.slice(0, 7);
const tier2000 = allUnits.slice(7);

function sumPts(units) { return units.reduce((s,u) => s + u.pts, 0); }
function sumModels(units) { return units.reduce((s,u) => s + u.count, 0); }

const statuses = ['Unbuilt','Built','Primed','Painting','Based','Done'];

function renderRow(unit) {
  const tagClass = unit.own === 'OWN' ? 'tag-own' : 'tag-buy';
  let html = '<tr>';
  html += '<td><img class="unit-img" src="' + unit.img + '" alt="' + unit.name + '"></td>';
  html += '<td><span class="unit-name">' + unit.name + '</span></td>';
  html += '<td style="text-align:center;font-weight:700">' + unit.count + '</td>';
  html += '<td style="text-align:center;font-weight:700">' + unit.pts + '</td>';
  html += '<td style="text-align:center"><span class="tag ' + tagClass + '">' + unit.own + '</span>';
  if (unit.src) html += '<span style="font-size:6pt;color:#888;margin-left:2px;display:block;text-align:center;">(' + unit.src + ')</span>';
  html += '</td>';
  html += '<td><div class="status-boxes">';
  statuses.forEach(function(s) {
    if (unit.painted) {
      html += '<div class="status-item"><span class="check-box checked"></span>' + s + '</div>';
    } else {
      html += '<div class="status-item"><span class="check-box"></span>' + s + '</div>';
    }
  });
  html += '</div></td>';
  html += '</tr>';
  return html;
}

function renderTier(title, subtitle, units, prevPts) {
  var tierPts = sumPts(units);
  var tierModels = sumModels(units);
  var cumPts = prevPts + tierPts;

  var runningText = '';
  if (prevPts > 0) {
    runningText = tierPts + 'pts new + ' + prevPts + 'pts previous = ' + cumPts + 'pts total';
  } else {
    runningText = cumPts + 'pts total';
  }

  var html = '<div class="tier-page">';
  html += '<div class="tier-header">';
  html += '<div class="tier-title">' + title + '</div>';
  if (subtitle) html += '<div class="tier-subtitle">' + subtitle + '</div>';
  html += '</div>';

  html += '<table class="roster-table">';
  html += '<thead><tr>';
  html += '<th style="width:90px">Image</th>';
  html += '<th>Unit</th>';
  html += '<th style="width:55px;text-align:center">Models</th>';
  html += '<th style="width:50px;text-align:center">Pts</th>';
  html += '<th style="width:50px;text-align:center">Status</th>';
  html += '<th style="width:260px">Progress</th>';
  html += '</tr></thead><tbody>';
  units.forEach(function(u) { html += renderRow(u); });
  html += '</tbody></table>';

  html += '<div class="tier-totals">';
  html += '<span class="total-pts">' + tierPts + ' pts</span>';
  html += '<span class="total-models">' + tierModels + ' models</span>';
  html += '<span class="running">' + runningText + '</span>';
  html += '</div>';

  html += '</div>';
  return html;
}

document.addEventListener('DOMContentLoaded', function() {
  var pts1000 = sumPts(tier1000);

  var html = '';
  html += renderTier('1000pt Base Army', 'Sylvaneth Outcasts — Core force', tier1000, 0);
  html += renderTier('2000pt Army', 'Additions to reach 2000pts', tier2000, pts1000);

  document.body.innerHTML = html;
});
</script>

</body>
</html>
