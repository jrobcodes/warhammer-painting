  }

  /* Header — compact */

    text-align: center;
    margin-bottom: 4px;
    border-bottom: 2px solid #222;
    padding-bottom: 3px;
  }

  }
  .model-meta {

    align-items: center;
    gap: 10px;
    font-size: 8pt;
    flex-wrap: wrap;
  }
  .meta-item {
    font-weight: 600;
  }
  .tag {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 3px;
    font-size: 8pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tag-warrior { background: #2d5a27; color: #fff; }
  .tag-overlord { background: #8b6914; color: #fff; }
  .tag-custom { background: #6a1b9a; color: #fff; }
  .tag-own { background: #1565c0; color: #fff; }
  .tag-buy { background: #c62828; color: #fff; }

  /* Content — image + zones side by side in landscape */
  .model-body {
    display: flex;
    gap: 12px;
    flex: 1;
    align-items: flex-start;
    margin-top: 4px;
  }
  .model-image {
    flex-shrink: 0;
  }
  .img-container {
    position: relative;
    display: inline-block;
  }
  .img-container img {
    width: 260px;
    height: 260px;
    object-fit: contain;
    border-radius: 6px;
    background: #f5f5f5;
    border: 1px solid #ddd;
    display: block;
  }
  .dot {
    position: absolute;
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 9pt; color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.7);
    border: 2px solid #fff;
    transform: translate(-50%, -50%);
    z-index: 2;
  }
  @media print {
    .dot { box-shadow: none; }
  }

  /* Zones */
  .zones {
    flex: 1;
    columns: 2;
    column-gap: 10px;
    font-size: 7pt;
  }
  .zone-block {
    break-inside: avoid;
    margin-bottom: 3px;
    border: 1px solid #ccc;
    border-radius: 3px;
    padding: 3px 5px;
    background: #fafafa;
  }
  .zone-title {
    font-weight: 800;
    font-size: 7.5pt;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .zone-letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px; height: 16px;
    border-radius: 3px;
    color: #fff;
    font-weight: 800;
    font-size: 7pt;
    flex-shrink: 0;
  }
  .swatch {
    display: inline-block;
    width: 9px; height: 9px;
    border-radius: 2px;
    border: 1px solid #999;
    vertical-align: middle;
    flex-shrink: 0;
  }
  .step-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .step-list li {
    padding: 2px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .step-list li:last-child { border-bottom: none; }
  .step-head {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .step-num {
    font-weight: 700;
    color: #555;
    min-width: 16px;
    text-align: right;
    flex-shrink: 0;
  }
  .step-paint {

  }
  .step-where {

    color: #555;
    font-size: 6.5pt;
    line-height: 1.25;
    padding-left: 20px;
    margin-top: 0px;
  }

  .glow-note {
    font-size: 7.5pt;
    color: #2e7d32;
    font-style: italic;
    margin-top: 2px;
    padding: 2px 4px;
    background: #e8f5e9;
    border-radius: 2px;
  }

  /* Checklist — compact */

    border-top: 1px solid #ccc;
    display: flex;
    justify-content: center;

    flex-shrink: 0;
  }

function renderDots(modelName) {
  const dots = MODEL_DOTS[modelName];
  if (!dots) return '';
  return dots.map(d => {
    const dc = DOT_COLORS[d.z] || { bg:'#555' };
    const styles = [
      `top:${d.top}`, `left:${d.left}`,
      `background-color:${dc.bg}`
    ];
    if (dc.color) styles.push(`color:${dc.color}`);
    if (dc.textShadow) styles.push(`text-shadow:${dc.textShadow}`);
    if (dc.border) styles.push(`border-color:${dc.border}`);
    return `<div class="dot" style="${styles.join(';')}">${d.z}</div>`;
  }).join('');
}

/* ── Stage-based painting steps (correct order: base everything, shade everything, THEN highlight) ── */

function getModelStages(model) {
  // Scarabs: speed paint
  if (model.name === 'Canoptek Scarab Swarms') {
    return [{
      stage: 'Speed Paint Recipe', color: '#555',
      steps: [
        {paint:'Leadbelcher Spray', zone:'A', where:'prime black first, then spray metallic over entire swarm base'},
        {paint:'Nuln Oil', zone:'A', where:'wash ALL OVER — heavy, let it pool between the little bugs'},
        {paint:'Stormhost Silver', zone:'C', where:'drybrush or edge highlight a few wing/carapace edges'},
        {paint:'Moot Green', zone:'D', where:'tiny dots on each scarab\'s eyes. That\'s it for the bugs!'},
        {paint:'Vallejo Desert Sand', zone:'E', where:'texture paste on base, push in 1 small crystal while wet. Let dry.'},
        {paint:'Agrax Earthshade', zone:'E', where:'wash the sand (not crystal).'},
        {paint:'Ushabti Bone', zone:'E', where:'drybrush the sand.'},
        {paint:'Caliban Green → Moot Green → White tip', zone:'E', where:'paint the crystal with glow recipe. Black base rim.'}
      ]
    }];
  }

  // C'tan Void Dragon: custom
  if (model.name === "C'tan Void Dragon") {
    return [
      { stage: '1. Base Coats', color: '#555', steps: [
        {paint:'Corax White', zone:'X', where:'base coat the ENTIRE ethereal body — torso, limbs, face. NOT metallic like other Necrons.'},
        {paint:'Leadbelcher Spray', zone:'Y', where:'spray the metallic WING SPINES and mechanical collar/halo — ancient Necron tech.'},
        {paint:'Matt Black', zone:'Z', where:'base coat ALL energy areas solid black — every tendril, sword blade, lightning arcs, base connections. There\'s A LOT.'},
      ]},
      { stage: '2. Shades & Washes', color: '#555', steps: [
        {paint:'Mechanicus Std Grey', zone:'X', where:'shade the DEEPEST RECESSES of the body — muscle definition, under arms, joint areas.'},
        {paint:'Black Templar', zone:'Y', where:'Contrast paint over ALL wing/spine surfaces to darken and add depth.'},
        {paint:'Nuln Oil', zone:'Y', where:'wash into recesses of wing joints and mechanical details.'},
      ]},
      { stage: '3. Layers & Glow', color: '#555', steps: [
        {paint:'Biel-tan Green', zone:'X', where:'glaze over the ENTIRE body for an eerie green tint — otherworldly, not alive, not dead.'},
        {paint:'White Scar', zone:'X', where:'highlight the HIGHEST muscle/bone points — shoulders, chest, face ridges.'},
        {paint:'Caliban Green', zone:'Z', where:'fill ALL energy areas — much more coverage than a Warrior. Entire tendrils, full sword blade.'},
        {paint:'Warpstone Glow', zone:'Z', where:'build up brighter green in the centers of all energy channels and tendrils.'},
        {paint:'Moot Green', zone:'Z', where:'hot centers — where tendrils connect to body, chest orb core, sword tip.'},
        {paint:'White dot', zone:'Z', where:'pinprick highlights at absolute hottest points.'},
      ]},
      { stage: '4. Glazes & Finish', color: '#555', steps: [
        {paint:'Biel-tan Green', zone:'Z', where:'glaze ALL green energy to unify. Consider Vallejo Fluorescent Green for extra pop.'},
        {paint:'Casandora Yellow', zone:'Z', where:'dab at hottest energy points — chest core center, sword tip, tendril junctions.'},
        {paint:'Moon Dust', zone:'E', where:'base rim and texture.'},
      ]},
    ];
  }

  const stages = [];
  const isOverlord = model.scheme === 'overlord';
  const hasCloth = model.extraZones && model.extraZones.includes('G');
  const hasBlue = model.extraZones && model.extraZones.includes('P');
  const hasCloak = model.extraZones && model.extraZones.includes('K');
  const hasFlesh = model.extraZones && model.extraZones.includes('S');
  const hasBlood = model.extraZones && model.extraZones.includes('T');
  const hasBlade = model.extraZones && model.extraZones.includes('I');

  // STAGE 1: PRIME
  const primeSteps = [
    {paint:'Leadbelcher Spray', zone:'A', where:'spray the ENTIRE model from ~20cm away, even coats, rotating the model. Primer + metallic base in one step.'},
  ];
  stages.push({ stage: '1. Prime', color: '#888', steps: primeSteps });

  // STAGE 2: BASE COATS (all areas get their base color before any shading)
  const baseSteps = [
    {paint:'Black Templar', zone:'A', where:'brush over the ENTIRE model. This Contrast paint pools in recesses for shadow. Wick away pooling on flat surfaces with a clean brush.'},
    {paint:'Runelord Brass', zone:'B', where:'paint shoulder pads, kneecaps, chest dynasty symbol, spine ridge, and all raised decorative trim.'},
    {paint:'Matt Black', zone:'D', where:'base coat the glow areas solid black — eyes, gun barrel interior, gauss rod, chest orb. Dark base makes green pop.'},
  ];
  if (isOverlord) {
    baseSteps.push({paint:'Retributor Armour', zone:'F', where:'paint gold rank markings — crown/crest, face plate, chest eagle, weapon ornaments. Gold REPLACES dark metallic here. More gold = higher rank.'});
  }
  if (hasCloth) {
    baseSteps.push({paint:'Wyldwood', zone:'G', where:'apply Contrast to the TABARD/LOINCLOTH. Let it pool in folds — Contrast does the shading for you.'});
    baseSteps.push({paint:'Basilicanum Grey', zone:'G', where:'apply Contrast to BELT, ARM WRAPS, leather straps. Let it pool in folds.'});
  }
  if (hasBlue) {
    baseSteps.push({paint:'Abaddon Black', zone:'P', where:'base coat the entire psychic projection solid black — the pixelated holographic shape.'});
    baseSteps.push({paint:'Kantor Blue', zone:'P', where:'base coat the projection body with dark blue. Leave black in deepest recesses between pixel blocks.'});
  }
  if (hasCloak) {
    baseSteps.push({paint:'Leadbelcher', zone:'K', where:'base coat the ENTIRE canoptek cloak — spider body and all mechanical legs underneath.'});
  }
  if (hasFlesh) {
    baseSteps.push({paint:'Rakarth Flesh', zone:'S', where:'base coat ALL flayed skin — the draped flesh on shoulders, chest, back, dangling strips. Pale bone-white starting point.'});
  }
  if (hasBlade) {
    baseSteps.push({paint:'Iron Hands Steel', zone:'I', where:'paint BLADE EDGES and weapon surfaces. Brighter metallic tone than the body, making weapons look like polished steel.'});
  }
  stages.push({ stage: '2. Base Coats', color: '#2e7d32', steps: baseSteps });

  // STAGE 3: SHADES & WASHES (all at once — let each dry before next)
  const washSteps = [
    {paint:'Nuln Oil', zone:'A', where:'wash into RECESSES ONLY — panel lines, joint gaps, where body parts meet. Target the crevices, don\'t slather everywhere.'},
    {paint:'Cryptek Armourshade', zone:'B', where:'wash into recesses WHERE BRONZE MEETS BODY — around shoulder pad edges, rivets, where trim meets dark panels.'},
  ];
  if (isOverlord) {
    washSteps.push({paint:'Cryptek Armourshade Gloss', zone:'F', where:'thin wash over ALL gold areas. GLOSS finish = rich polished look. Apply thinly — don\'t pool on flat gold.'});
  }
  if (hasCloak) {
    washSteps.push({paint:'Nuln Oil', zone:'K', where:'HEAVY wash all over the cloak — noticeably DARKER than the Cryptek body. Looks like a separate creature.'});
  }
  if (hasFlesh) {
    washSteps.push({paint:'Reikland Fleshshade', zone:'S', where:'wash into ALL SKIN FOLDS and edges where flesh meets metal. Creates natural depth and warmth.'});
  }
  stages.push({ stage: '3. Shades & Washes', color: '#6a1b9a', steps: washSteps });

  // STAGE 4: LAYERS & HIGHLIGHTS (now safe to do — base and shade are locked in)
  const layerSteps = [
    {paint:'Canoptek Alloy', zone:'B', where:'highlight TOP EDGES of bronze areas — upper rim of shoulder pads, top of chest symbol. Leave darker Runelord Brass underneath.'},
    {paint:'Stormhost Silver', zone:'C', where:'fine edge highlights on SHARPEST edges — head crest tips, ribcage edges, leg ridges, arm plates. Dots on rivets. Side of brush, thin lines — less is more.'},
  ];
  if (isOverlord) {
    layerSteps.push({paint:'Liberator Gold', zone:'F', where:'highlight TOP EDGES of gold — crown horns, face plate ridges, chest symbol peak. Brighter gold over darker Retributor.'});
  }
  if (hasCloth) {
    layerSteps.push({paint:'Administratum Grey', zone:'G', where:'highlight TOP OF CLOTH FOLDS — highest raised points of tabard and strap edges only.'});
  }
  if (hasBlue) {
    layerSteps.push({paint:'Teclis Blue', zone:'P', where:'layer RAISED SURFACES of projection — outer pixel block faces, prominent features of the ghostly face.'});
    layerSteps.push({paint:'Lothern Blue', zone:'P', where:'highlight EDGES of projection — pixel block edges brighter than faces. Creates holographic glow.'});
    layerSteps.push({paint:'Corax White', zone:'P', where:'brightest points only — tips of prominent features, face details. Looks like emitting light.'});
  }
  if (hasCloak) {
    layerSteps.push({paint:'Mechanicus Std Grey', zone:'K', where:'DRYBRUSH raised cloak areas — carapace plates, leg joints. Picks up mechanical detail beautifully.'});
    layerSteps.push({paint:'Stormhost Silver', zone:'K', where:'edge highlight CLAW TIPS and sharp leg joint edges.'});
  }
  if (hasFlesh) {
    layerSteps.push({paint:'Flayed One Flesh', zone:'S', where:'layer RAISED skin surfaces — stretched areas, smooth outer face of hanging strips. Leave recesses darker.'});
    layerSteps.push({paint:'Pallid Wych Flesh', zone:'S', where:'fine highlight on HIGHEST skin points — sickly pale, top edges of shoulder drapes.'});
    layerSteps.push({paint:'Druchii Violet', zone:'S', where:'thin glaze on edges WHERE SKIN MEETS METAL — bruised look. Also along torn skin edges.'});
  }
  stages.push({ stage: '4. Layers & Highlights', color: '#e65100', steps: layerSteps });

  // STAGE 5: GREEN GLOW (done after all metallic work is finished)
  const glowSteps = [
    {paint:'Caliban Green', zone:'D', where:'fill glow areas with dark green, leaving a thin BLACK RING visible around the outer edge.'},
    {paint:'Warpstone Glow', zone:'D', where:'paint a SMALLER area in the center. Leave Caliban Green at edges. Each layer gets smaller.'},
    {paint:'Moot Green', zone:'D', where:'bright dot or thin line at the CENTER — hottest point. Eyes: tiny dot. Gauss rods: thin center line.'},
    {paint:'White dot', zone:'D', where:'absolute PINPRICK of white at center of each eye. "Light source" reflection. Smallest brush tip.'},
  ];
  stages.push({ stage: '5. Green Glow (Zone D)', color: '#1b7a2e', steps: glowSteps });

  // STAGE 6: GLAZES (unify and finish)
  const glazeSteps = [
    {paint:'Biel-tan Green', zone:'D', where:'glaze (thin wash) over ALL green glow areas to unify layers and add glossy, ethereal sheen.'},
    {paint:'Casandora Yellow', zone:'D', where:'tiny DAB at very center of each eye only. Shifts hottest point toward yellow-white. One dab per eye.'},
  ];
  stages.push({ stage: '6. Glazes', color: '#00695c', steps: glazeSteps });

  // STAGE 7: BASING — reference to separate card
  const isHero = isOverlord || model.name.includes('Lord') || model.name.includes('C\'tan');
  const isElite = model.name.includes('Skorpekh Dest') || model.name.includes('Lychguard') || model.name.includes('Wraith') || model.name.includes('Lokhust') || model.name.includes('Flayed');
  const isCenterpiece = model.name.includes('C\'tan');

  let baseType = 'TROOPS';
  if (isCenterpiece) baseType = 'CENTERPIECE';
  else if (isHero) baseType = 'HERO';
  else if (isElite) baseType = 'ELITE';

  const finishSteps = [
    {paint:'See Basing Card', zone:'E', where:'Follow the Crystal Tomb World basing card (first page). This model uses the ' + baseType + ' tier.'},
  ];
  if (hasBlood) {
    finishSteps.push({paint:'Blood for the Blood God', zone:'T', where:'apply to CLAW TIPS, finger blades, torn skin edges. Glossy technical paint = wet blood. Dab on, let run/pool. Apply DEAD LAST so glossy finish doesn\'t get messed up.'});
  }
  stages.push({ stage: '7. Basing & Finish (' + baseType + ')', color: '#795548', steps: finishSteps });

  return stages;
}

function renderSwatch(paint) {
  const c = PAINT_SWATCHES[paint] || '#ccc';
  return `<span class="swatch" style="background:${c}"></span>`;
}

function renderStageBlock(stage) {
  const stageColor = stage.color || '#555';
  let html = `<div class="zone-block" style="border-left:3px solid ${stageColor};">`;
  html += `<div class="zone-title" style="color:${stageColor};">`;
  html += `<span>${stage.stage}</span></div>`;
  html += `<ul class="step-list">`;
  stage.steps.forEach((s, i) => {
    const zoneDot = DOT_COLORS[s.zone] ? `<span class="zone-letter" style="background-color:${DOT_COLORS[s.zone].bg};${DOT_COLORS[s.zone].color ? 'color:'+DOT_COLORS[s.zone].color+';' : ''}font-size:6pt;width:14px;height:14px;">${s.zone}</span>` : '';
    html += `<li>`;
    html += `<div class="step-head"><span class="step-num">${i+1}.</span>${renderSwatch(s.paint)}${zoneDot}<span class="step-paint">${s.paint}</span></div>`;
    html += `<div class="step-where">${s.where}</div>`;
    html += `</li>`;
  });
  html += `</ul></div>`;
  return html;
}

function renderCard(model) {
  const schemeLabels = {
    warrior: 'Warrior Scheme',
    overlord: 'Overlord Scheme',
  };
  const schemeDescs = {
    warrior: 'Dark metallic body + bronze trim + silver edges + green glow + base. The standard Szarekhan recipe used by most infantry and vehicles.',
    overlord: 'Full Warrior scheme PLUS gold rank details (crown, chest, trim), cloth/robes, and polished steel on weapons. Used by characters and leaders.',
  };
  const schemeLabel = schemeLabels[model.scheme] || (model.customLabel || 'Custom');
  const schemeDesc = schemeDescs[model.scheme] || model.customDesc || '';
  const schemeClass = model.scheme === 'warrior' ? 'tag-warrior' :
                      model.scheme === 'overlord' ? 'tag-overlord' : 'tag-custom';
  const ownerClass = model.ownership === 'OWN' ? 'tag-own' : 'tag-buy';

  const stages = getModelStages(model);

  let html = `<div class="model-page">`;
  // Header
  html += `<div class="model-header">`;
  html += `<div class="model-name">${model.name}</div>`;
  html += `<div class="model-meta">`;
  html += `<span class="meta-item">${model.pts}pts</span>`;
  html += `<span class="meta-item">${model.count} model${model.count>1?'s':''}</span>`;
  html += `<span class="tag ${schemeClass}">${schemeLabel}</span>`;
  html += `<span class="tag ${ownerClass}">${model.ownership}</span>`;
  if (schemeDesc) {
    html += `<div style="font-size:7.5pt;color:#666;margin-top:4px;max-width:600px;margin-left:auto;margin-right:auto;font-style:italic;">${schemeDesc}</div>`;
  }
  html += `</div></div>`;

  // Body — image + zones side by side
  html += `<div class="model-body">`;

  // Image with zone dots
  html += `<div class="model-image"><div class="img-container"><img src="${IMG_BASE}${model.img}" alt="${model.name}">${renderDots(model.name)}</div>`;
  if (model.glowNote) {
    html += `<div class="glow-note" style="margin-top:4px;"><strong>Glow:</strong> ${model.glowNote}</div>`;
  }
  html += `</div>`;

  // Zones
  html += `<div class="zones">`;
  stages.forEach(s => { html += renderStageBlock(s); });
  html += `</div>`;

  html += `</div>`; // end model-body

  // Checklist
  html += `<div class="checklist">`;
  ['Built','Primed','Painted','Based','Done'].forEach(s => {
    html += `<label><span class="check-box"></span> ${s}</label>`;
  });
  html += `</div>`;

  html += `</div>`;
  return html;
}

// Render all
document.addEventListener('DOMContentLoaded', () => {
  document.body.innerHTML = renderBasingCard() + models.map(renderCard).join('');

      <span class="meta-item">All Models</span>
      <span class="tag tag-custom" style="background:#795548;">Reference Card</span>

  </div>

  <div style="font-size:8pt;padding:8px;background:#f0f7ff;border:1px solid #b0c4de;border-radius:4px;margin:8px 0;color:#333;">

        <div class="step-where">Spread onto base with old brush or sculpting tool. While still WET, push clear resin crystals into the paste at angles. Let dry ~1 hour (or overnight if doing cork).</div></li>
        <li><div class="step-head"><span class="step-num">2.</span>${renderSwatch('Nuln Oil')}<span class="step-paint">Nuln Oil</span></div>
        <div class="step-where">Wash the ENTIRE base texture (avoid crystals). This darkens the sand to an ashen, scorched earth tone. Gets into all the gritty crevices.</div></li>
        <li><div class="step-head"><span class="step-num">3.</span>${renderSwatch('Mechanicus Std Grey')}<span class="step-paint">Mechanicus Standard Grey</span></div>
        <div class="step-where">DRYBRUSH the raised sand texture. Lightly drag a mostly-dry brush across the grit. Picks up the texture as pale grey dust over the dark base.</div></li>
        <li><div class="step-head"><span class="step-num">4.</span>${renderSwatch('Administratum Grey')}<span class="step-paint">Administratum Grey</span></div>
        <div class="step-where">LIGHT drybrush — just the very highest points. Creates an ashen, dusty look. Don't overdo it — you want most of the base to stay dark.</div></li>
      </ul>
    </div>

    <div class="zone-block" style="border-left:3px solid #1b7a2e;">
      <div class="zone-title" style="color:#1b7a2e;">Crystal Glow (all models)</div>
      <ul class="step-list">
        <li><div class="step-head"><span class="step-num">5.</span>${renderSwatch('Abaddon Black')}<span class="step-paint">Abaddon Black</span></div>
        <div class="step-where">Paint crystals solid black (if not already black from priming). Dark base makes the green pop.</div></li>
        <li><div class="step-head"><span class="step-num">6.</span>${renderSwatch('Caliban Green')}<span class="step-paint">Caliban Green</span></div>
        <div class="step-where">Paint crystals dark green. Leave black visible at the very base where crystal meets sand.</div></li>
        <li><div class="step-head"><span class="step-num">7.</span>${renderSwatch('Warpstone Glow')}<span class="step-paint">Warpstone Glow</span></div>
        <div class="step-where">Layer the upper half / tips of each crystal with brighter green.</div></li>
        <li><div class="step-head"><span class="step-num">8.</span>${renderSwatch('Moot Green')}<span class="step-paint">Moot Green</span></div>
        <div class="step-where">Crystal TIPS only — bright green, energy concentrating at the point.</div></li>
        <li><div class="step-head"><span class="step-num">9.</span>${renderSwatch('White dot')}<span class="step-paint">White dot</span></div>
        <div class="step-where">Tiny white dot at the very tip of each crystal.</div></li>
        <li><div class="step-head"><span class="step-num">10.</span>${renderSwatch('Biel-tan Green')}<span class="step-paint">Biel-tan Green</span></div>
        <div class="step-where">Glaze over all crystals to unify and add glossy sheen.</div></li>
      </ul>
    </div>

    <div class="zone-block" style="border-left:3px solid #333;">
      <div class="zone-title" style="color:#333;">Finish (all models)</div>
      <ul class="step-list">

          <div class="step-where">Glue 2-3 STACKED cork chunks for a rocky outcrop — build up height so model towers over everything. 5-6 crystals (mix sizes, mostly medium), dramatic cluster formation. Rock chips. Heavy OSL glow on surrounding sand. Glue 1-2 spare Necron bits from sprues (broken scarab, weapon shard) — paint metallic + wash. Makes the base tell a story.</div>
        </li>
      </ul>
    </div>
  </div>

  <div class="checklist">
    <label><span class="check-box"></span> Cork glued</label>

    <label><span class="check-box"></span> Crystals embedded</label>
    <label><span class="check-box"></span> Dried</label>
    <label><span class="check-box"></span> Primed with model</label>
    <label><span class="check-box"></span> Base painted</label>
    <label><span class="check-box"></span> Crystals painted</label>
    <label><span class="check-box"></span> Rim done</label>
  </div>
</div>`;
}
