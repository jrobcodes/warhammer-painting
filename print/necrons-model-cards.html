<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Szarekhan Necrons — Model Painting Cards</title>
<style>
  @page { size: letter; margin: 0.5in; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #fff; color: #1a1a1a;
    font-size: 8.5pt; line-height: 1.3;
  }

  .model-page {
    page-break-after: always;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 0;
  }
  .model-page:last-child { page-break-after: auto; }

  /* Header */
  .model-header {
    text-align: center;
    margin-bottom: 8px;
    border-bottom: 2.5px solid #222;
    padding-bottom: 6px;
  }
  .model-name {
    font-size: 18pt;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .model-meta {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    font-size: 9pt;
    flex-wrap: wrap;
  }
  .meta-item {
    font-weight: 600;
  }
  .tag {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 3px;
    font-size: 8pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tag-warrior { background: #2d5a27; color: #fff; }
  .tag-overlord { background: #8b6914; color: #fff; }
  .tag-custom { background: #6a1b9a; color: #fff; }
  .tag-own { background: #1565c0; color: #fff; }
  .tag-buy { background: #c62828; color: #fff; }

  /* Image */
  .model-image {
    text-align: center;
    margin: 6px 0 8px;
  }
  .model-image img {
    width: 350px;
    height: 350px;
    object-fit: contain;
    border-radius: 8px;
    background: #f5f5f5;
    border: 1px solid #ddd;
  }

  /* Zones */
  .zones {
    flex: 1;
    columns: 2;
    column-gap: 16px;
    font-size: 8pt;
  }
  .zone-block {
    break-inside: avoid;
    margin-bottom: 6px;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 5px 6px;
    background: #fafafa;
  }
  .zone-title {
    font-weight: 800;
    font-size: 8.5pt;
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .zone-letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px; height: 18px;
    border-radius: 3px;
    color: #fff;
    font-weight: 800;
    font-size: 8pt;
    flex-shrink: 0;
  }
  .swatch {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 2px;
    border: 1px solid #999;
    vertical-align: middle;
    margin-right: 3px;
    flex-shrink: 0;
  }
  .step-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .step-list li {
    padding: 1px 0;
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .step-num {
    font-weight: 700;
    color: #555;
    min-width: 14px;
    text-align: right;
    flex-shrink: 0;
  }
  .step-where {
    color: #666;
    font-style: italic;
    font-size: 7.5pt;
  }

  .glow-note {
    font-size: 7.5pt;
    color: #2e7d32;
    font-style: italic;
    margin-top: 2px;
    padding: 2px 4px;
    background: #e8f5e9;
    border-radius: 2px;
  }

  /* Checklist */
  .checklist {
    margin-top: 8px;
    padding-top: 6px;
    border-top: 1.5px solid #ccc;
    display: flex;
    justify-content: center;
    gap: 16px;
    font-size: 9pt;
    font-weight: 600;
  }
  .checklist label {
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .check-box {
    display: inline-block;
    width: 14px; height: 14px;
    border: 1.5px solid #555;
    border-radius: 2px;
    flex-shrink: 0;
  }

  @media print {
    body { padding: 0; }
    .model-page { height: auto; min-height: 100vh; }
  }
</style>
</head>
<body>

<script>

// Zone definitions
const ZONE_COLORS = {
  A: '#3a3a3a', B: '#a87832', C: '#d0d0d0', D: '#39a832',
  E: '#c4a96a', F: '#d4a017', G: '#7a6652', I: '#8a9bae',
  P: '#1a5fa8', K: '#5a5a5a', S: '#d4b896', T: '#8b0000',
  X: '#e8e8e8', Y: '#3a3a3a', Z: '#39a832'
};

const ZONE_NAMES = {
  A: 'Dark Metallic', B: 'Bronze Trim', C: 'Silver Highlights', D: 'Green Glow',
  E: 'Base', F: 'Gold Rank', G: 'Cloth', I: 'Polished Steel',
  P: 'Blue Projection', K: 'Canoptek Cloak', S: 'Flesh', T: 'Blood',
  X: 'Ethereal Body', Y: 'Metallic Wings', Z: 'Green Energy'
};

const PAINT_SWATCHES = {
  'Leadbelcher Spray': '#888c8d',
  'Leadbelcher': '#888c8d',
  'Black Templar': '#2a2a2a',
  'Nuln Oil': '#32302e',
  'Runelord Brass': '#a87832',
  'Canoptek Alloy': '#c8a55a',
  'Cryptek Armourshade': '#5a4a32',
  'Cryptek Armourshade Gloss': '#5a4a32',
  'Stormhost Silver': '#d8d8d8',
  'Matt Black': '#1a1a1a',
  'Abaddon Black': '#1a1a1a',
  'Caliban Green': '#003d15',
  'Warpstone Glow': '#0f820f',
  'Moot Green': '#3daf34',
  'White dot': '#ffffff',
  'Biel-tan Green': '#4b6b3a',
  'Casandora Yellow': '#f4a830',
  'Moon Dust': '#c4a96a',
  'Retributor Armour': '#c39b2d',
  'Liberator Gold': '#d4a540',
  'Wyldwood': '#5e3f27',
  'Basilicanum Grey': '#5a5a5a',
  'Administratum Grey': '#a8a8a8',
  'Iron Hands Steel': '#7a8a96',
  'Kantor Blue': '#02325a',
  'Teclis Blue': '#2e7ec2',
  'Lothern Blue': '#4ea6dc',
  'Corax White': '#f0f0f0',
  'Mechanicus Std Grey': '#6a6a6a',
  'White Scar': '#ffffff',
  'Rakarth Flesh': '#c4b398',
  'Reikland Fleshshade': '#c27a4a',
  'Flayed One Flesh': '#d6c4a6',
  'Pallid Wych Flesh': '#e8dcc8',
  'Druchii Violet': '#6a3478',
  'Blood for the Blood God': '#8b0000'
};

function getZoneSteps(zoneId, model) {
  const modelName = model.name;
  switch(zoneId) {
    case 'A': return [
      {n:1, paint:'Leadbelcher Spray', where:'entire model'},
      {n:2, paint:'Black Templar', where:'all over — contrast coat'},
      {n:3, paint:'Nuln Oil', where:'recesses only'}
    ];
    case 'B': return [
      {n:4, paint:'Runelord Brass', where:'shoulder pads, trim, dynasty markings'},
      {n:5, paint:'Canoptek Alloy', where:'highlight top edges of bronze'},
      {n:6, paint:'Cryptek Armourshade', where:'wash into bronze recesses'}
    ];
    case 'C': return [
      {n:7, paint:'Stormhost Silver', where:'sharpest edges, rivets'}
    ];
    case 'D': return [
      {n:8, paint:'Matt Black', where:'base coat glow areas'},
      {n:9, paint:'Caliban Green', where:'fill glow areas'},
      {n:10, paint:'Warpstone Glow', where:'center of glow'},
      {n:11, paint:'Moot Green', where:'hot center point'},
      {n:12, paint:'White dot', where:'pinprick highlight'},
      {n:13, paint:'Biel-tan Green', where:'glaze to blend'},
      {n:14, paint:'Casandora Yellow', where:'center dab for heat'}
    ];
    case 'E': return [
      {n:15, paint:'Moon Dust', where:'entire base rim and texture'}
    ];
    case 'F': return [
      {n:1, paint:'Retributor Armour', where:'rank insignia, crown, special trim'},
      {n:2, paint:'Liberator Gold', where:'highlight gold edges'},
      {n:3, paint:'Cryptek Armourshade Gloss', where:'wash gold recesses'}
    ];
    case 'G': return [
      {n:1, paint:'Wyldwood', where:'cloak, tabard, cloth areas'},
      {n:2, paint:'Basilicanum Grey', where:'shade cloth folds'},
      {n:3, paint:'Administratum Grey', where:'highlight raised cloth'}
    ];
    case 'I': return [
      {n:1, paint:'Iron Hands Steel', where:'polished weapon surfaces, blade edges'}
    ];
    case 'P': return [
      {n:1, paint:'Abaddon Black', where:'base projection area'},
      {n:2, paint:'Kantor Blue', where:'fill projection'},
      {n:3, paint:'Teclis Blue', where:'mid highlight'},
      {n:4, paint:'Lothern Blue', where:'edges of projection'},
      {n:5, paint:'Corax White', where:'brightest points'}
    ];
    case 'K': return [
      {n:1, paint:'Leadbelcher', where:'entire canoptek cloak'},
      {n:2, paint:'Nuln Oil', where:'heavy wash all over cloak'},
      {n:3, paint:'Mechanicus Std Grey', where:'drybrush raised areas'},
      {n:4, paint:'Stormhost Silver', where:'edge highlight cloak plates'}
    ];
    case 'S': return [
      {n:1, paint:'Rakarth Flesh', where:'all flayed skin surfaces'},
      {n:2, paint:'Reikland Fleshshade', where:'wash into skin folds'},
      {n:3, paint:'Flayed One Flesh', where:'layer raised skin areas'},
      {n:4, paint:'Pallid Wych Flesh', where:'highlight skin edges'},
      {n:5, paint:'Druchii Violet', where:'thin wash on skin edges for bruising'}
    ];
    case 'T': return [
      {n:1, paint:'Blood for the Blood God', where:'claws, fingertips, dripping areas'}
    ];
    case 'X': return [
      {n:1, paint:'Corax White', where:'entire ethereal body'},
      {n:2, paint:'Mechanicus Std Grey', where:'shade deepest recesses'},
      {n:3, paint:'Biel-tan Green', where:'glaze for ghostly green tint'},
      {n:4, paint:'White Scar', where:'highlight raised surfaces'}
    ];
    case 'Y': return [
      {n:1, paint:'Leadbelcher Spray', where:'metallic wing surfaces'},
      {n:2, paint:'Black Templar', where:'all over wings'},
      {n:3, paint:'Nuln Oil', where:'wing recesses'}
    ];
    case 'Z': return [
      {n:1, paint:'Matt Black', where:'base all energy channels'},
      {n:2, paint:'Caliban Green', where:'fill energy areas — much more coverage than normal'},
      {n:3, paint:'Warpstone Glow', where:'build up green across body'},
      {n:4, paint:'Moot Green', where:'hot centers of energy'},
      {n:5, paint:'White dot', where:'pinprick highlights'},
      {n:6, paint:'Biel-tan Green', where:'glaze to unify'},
      {n:7, paint:'Casandora Yellow', where:'hottest energy points'}
    ];
    default: return [];
  }
}

function getModelZones(model) {
  const zones = [];
  if (model.name === 'Canoptek Scarab Swarms') {
    // Speed paint — custom zone list
    return [{
      id: 'SP',
      name: 'Speed Paint Recipe',
      color: '#555',
      steps: [
        {n:1, paint:'Leadbelcher Spray', where:'prime entire swarm black, then spray'},
        {n:2, paint:'Nuln Oil', where:'wash all over'},
        {n:3, paint:'Stormhost Silver', where:'edge highlight carapace plates'},
        {n:4, paint:'Moot Green', where:'tiny eye dots'},
        {n:5, paint:'Moon Dust', where:'base'}
      ]
    }];
  }
  if (model.name === "C'tan Void Dragon") {
    zones.push({id:'X', name:ZONE_NAMES.X, color:ZONE_COLORS.X, steps:getZoneSteps('X',model)});
    zones.push({id:'Y', name:ZONE_NAMES.Y, color:ZONE_COLORS.Y, steps:getZoneSteps('Y',model)});
    zones.push({id:'Z', name:ZONE_NAMES.Z, color:ZONE_COLORS.Z, steps:getZoneSteps('Z',model)});
    zones.push({id:'E', name:ZONE_NAMES.E, color:ZONE_COLORS.E, steps:getZoneSteps('E',model)});
    return zones;
  }
  // Standard zones A-E
  ['A','B','C','D','E'].forEach(z => {
    zones.push({id:z, name:ZONE_NAMES[z], color:ZONE_COLORS[z], steps:getZoneSteps(z,model)});
  });
  // Extra zones for overlord/custom
  if (model.extraZones) {
    model.extraZones.forEach(z => {
      zones.push({id:z, name:ZONE_NAMES[z], color:ZONE_COLORS[z], steps:getZoneSteps(z,model)});
    });
  }
  return zones;
}

function renderSwatch(paint) {
  const c = PAINT_SWATCHES[paint] || '#ccc';
  return `<span class="swatch" style="background:${c}"></span>`;
}

function renderZoneBlock(zone) {
  const letterBg = zone.color || '#555';
  const textColor = ['#d0d0d0','#e8e8e8','#d4b896','#c4a96a','#ffffff'].includes(letterBg) ? '#222' : '#fff';
  let html = `<div class="zone-block">`;
  html += `<div class="zone-title">`;
  html += `<span class="zone-letter" style="background:${letterBg};color:${textColor}">${zone.id}</span>`;
  html += `<span>${zone.name}</span></div>`;
  html += `<ul class="step-list">`;
  zone.steps.forEach(s => {
    html += `<li><span class="step-num">${s.n}.</span>${renderSwatch(s.paint)}<strong>${s.paint}</strong> <span class="step-where">— ${s.where}</span></li>`;
  });
  html += `</ul></div>`;
  return html;
}

function renderCard(model) {
  const schemeLabel = model.scheme === 'warrior' ? 'Warrior Scheme' :
                      model.scheme === 'overlord' ? 'Overlord Scheme' :
                      (model.customLabel || 'Custom');
  const schemeClass = model.scheme === 'warrior' ? 'tag-warrior' :
                      model.scheme === 'overlord' ? 'tag-overlord' : 'tag-custom';
  const ownerClass = model.ownership === 'OWN' ? 'tag-own' : 'tag-buy';

  const zones = getModelZones(model);

  let html = `<div class="model-page">`;
  // Header
  html += `<div class="model-header">`;
  html += `<div class="model-name">${model.name}</div>`;
  html += `<div class="model-meta">`;
  html += `<span class="meta-item">${model.pts}pts</span>`;
  html += `<span class="meta-item">${model.count} model${model.count>1?'s':''}</span>`;
  html += `<span class="tag ${schemeClass}">${schemeLabel}</span>`;
  html += `<span class="tag ${ownerClass}">${model.ownership}</span>`;
  html += `</div></div>`;

  // Image
  html += `<div class="model-image"><img src="${IMG_BASE}${model.img}" alt="${model.name}"></div>`;

  // Glow note
  if (model.glowNote) {
    html += `<div class="glow-note"><strong>Green Glow Notes:</strong> ${model.glowNote}</div>`;
  }

  // Zones
  html += `<div class="zones" style="margin-top:6px">`;
  zones.forEach(z => { html += renderZoneBlock(z); });
  html += `</div>`;

  // Checklist
  html += `<div class="checklist">`;
  ['Built','Primed','Painted','Based','Done'].forEach(s => {
    html += `<label><span class="check-box"></span> ${s}</label>`;
  });
  html += `</div>`;

  html += `</div>`;
  return html;
}

// Render all
document.addEventListener('DOMContentLoaded', () => {
  document.body.innerHTML = models.map(renderCard).join('');
});
</script>

</body>
</html>
