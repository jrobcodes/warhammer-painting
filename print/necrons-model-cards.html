<style>
  @page { size: letter; margin: 0.5in; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {

    background: #fff; color: #1a1a1a;
    font-size: 8.5pt; line-height: 1.3;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .model-page {
    page-break-after: always;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 0;
  }
  .model-page:last-child { page-break-after: auto; }

  /* Header */
  .model-header {
    text-align: center;
    margin-bottom: 8px;
    border-bottom: 2.5px solid #222;
    padding-bottom: 6px;
  }
  .model-name {
    font-size: 18pt;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .model-meta {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    font-size: 9pt;
    flex-wrap: wrap;
  }
  .meta-item {
    font-weight: 600;
  }
  .tag {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 3px;
    font-size: 8pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tag-warrior { background: #2d5a27; color: #fff; }
  .tag-overlord { background: #8b6914; color: #fff; }
  .tag-custom { background: #6a1b9a; color: #fff; }
  .tag-own { background: #1565c0; color: #fff; }
  .tag-buy { background: #c62828; color: #fff; }

  /* Image */
  .model-image {
    text-align: center;
    margin: 6px 0 8px;
  }
  .img-container {
    position: relative;
    display: inline-block;
  }
  .img-container img {
    width: 350px;
    height: 350px;
    object-fit: contain;
    border-radius: 8px;
    background: #f5f5f5;
    border: 1px solid #ddd;
    display: block;
  }
  .dot {
    position: absolute;
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 9pt; color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.7);
    border: 2px solid #fff;
    transform: translate(-50%, -50%);
    z-index: 2;
  }
  @media print {
    .dot { box-shadow: none; }
  }

  /* Zones */
  .zones {
    flex: 1;
    columns: 2;
    column-gap: 14px;
    font-size: 7.5pt;
  }
  .zone-block {
    break-inside: avoid;
    margin-bottom: 5px;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 5px 6px;
    background: #fafafa;
  }
  .zone-title {
    font-weight: 800;
    font-size: 8pt;
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .zone-letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px; height: 16px;
    border-radius: 3px;
    color: #fff;
    font-weight: 800;
    font-size: 7pt;
    flex-shrink: 0;
  }
  .swatch {
    display: inline-block;
    width: 9px; height: 9px;
    border-radius: 2px;
    border: 1px solid #999;
    vertical-align: middle;
    flex-shrink: 0;
  }
  .step-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .step-list li {
    padding: 2px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .step-list li:last-child { border-bottom: none; }
  .step-head {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .step-num {
    font-weight: 700;
    color: #555;
    min-width: 16px;
    text-align: right;
    flex-shrink: 0;
  }
  .step-paint {
    font-weight: 700;
  }
  .step-where {
    display: block;
    color: #555;
    font-size: 7pt;
    line-height: 1.3;
    padding-left: 20px;
    margin-top: 1px;
  }

  .glow-note {
    font-size: 7.5pt;
    color: #2e7d32;
    font-style: italic;
    margin-top: 2px;
    padding: 2px 4px;
    background: #e8f5e9;
    border-radius: 2px;
  }

  /* Checklist */
  .checklist {
    margin-top: 8px;
    padding-top: 6px;
    border-top: 1.5px solid #ccc;
    display: flex;
    justify-content: center;
    gap: 16px;
    font-size: 9pt;
    font-weight: 600;
  }
  .checklist label {
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .check-box {
    display: inline-block;
    width: 14px; height: 14px;
    border: 1.5px solid #555;
    border-radius: 2px;
    flex-shrink: 0;
  }

  @media print {
    body { padding: 0; }
    .model-page { height: auto; min-height: 100vh; }
  }

function renderDots(modelName) {
  const dots = MODEL_DOTS[modelName];
  if (!dots) return '';
  return dots.map(d => {
    const dc = DOT_COLORS[d.z] || { bg:'#555' };
    const styles = [
      `top:${d.top}`, `left:${d.left}`,
      `background-color:${dc.bg}`
    ];
    if (dc.color) styles.push(`color:${dc.color}`);
    if (dc.textShadow) styles.push(`text-shadow:${dc.textShadow}`);
    if (dc.border) styles.push(`border-color:${dc.border}`);
    return `<div class="dot" style="${styles.join(';')}">${d.z}</div>`;
  }).join('');
}

      {n:1, paint:'Leadbelcher Spray', where:'spray the ENTIRE model from 20cm away, even coats, rotating the model. This is your primer + metallic base in one step.'},
      {n:2, paint:'Black Templar', where:'brush over the ENTIRE model. This Contrast paint will pool in the recesses to create shadow and darken the metallic. Wick away any pooling on flat surfaces with a clean brush.'},
      {n:3, paint:'Nuln Oil', where:'wash into RECESSES ONLY — the lines between armor panels, joint gaps, where body parts meet. Don\'t slather it everywhere, target the crevices.'}
    ];
    case 'B': return [
      {n:4, paint:'Runelord Brass', where:'paint the shoulder pads, kneecaps, chest dynasty symbol (the raised Szarekhan emblem), spine ridge, and any other raised decorative trim on the armor.'},
      {n:5, paint:'Canoptek Alloy', where:'highlight just the TOP EDGES of the bronze areas — the upper rim of shoulder pads, the top of the chest symbol. Leave the darker Runelord Brass visible underneath.'},
      {n:6, paint:'Cryptek Armourshade', where:'wash into the recesses WHERE BRONZE MEETS THE BODY — around the edge of shoulder pads, around rivets, where trim meets dark armor panels. Deepens the bronze tones.'}
    ];
    case 'C': return [
      {n:7, paint:'Stormhost Silver', where:'fine edge highlights on the SHARPEST edges of the dark metallic body — head crest tips, ribcage plate edges, leg armor ridges, arm plate edges. Small dots on rivets. Use the side of your brush and keep lines thin — less is more.'}
    ];
    case 'D': return [
      {n:8, paint:'Matt Black', where:'base coat the glow areas solid black first — eyes, gun barrel interior, gauss rod, chest orb. This dark base makes the green pop.'},
      {n:9, paint:'Caliban Green', where:'fill the glow area with dark green, leaving a thin BLACK RING around the outer edge visible.'},
      {n:10, paint:'Warpstone Glow', where:'paint a SMALLER area in the center of each glow zone, leaving the dark Caliban Green visible at the edges. Each layer gets smaller.'},
      {n:11, paint:'Moot Green', where:'bright green dot or thin line at the very CENTER — the hottest, brightest point of the glow. On eyes: a tiny dot. On gauss rods: a thin center line.'},
      {n:12, paint:'White dot', where:'absolute PINPRICK of white at the center of each eye. Creates the "light source" reflection. Use the tip of your smallest brush.'},
      {n:13, paint:'Biel-tan Green', where:'glaze (thin wash) over ALL the green glow areas to unify the layers and add a glossy, ethereal sheen. Ties everything together.'},
      {n:14, paint:'Casandora Yellow', where:'tiny DAB of yellow at the very center of each eye only. Shifts the hottest point from green toward yellow-white, mimicking intense energy. Less is more — one tiny dab per eye.'}
    ];
    case 'E': return [
      {n:15, paint:'Moon Dust', where:'apply to the base — rim and top surface. Creates a desert/tomb world theme matching the Szarekhan dynasty.'}
    ];
    case 'F': return [
      {n:1, paint:'Retributor Armour', where:'paint the gold rank markings — crown/head crest, face plate, chest eagle/dynasty symbol, weapon handle ornaments. Gold REPLACES the dark metallic in these areas. More gold = higher rank.'},
      {n:2, paint:'Liberator Gold', where:'highlight the TOP EDGES of gold areas — upper rim of crown horns, raised face plate ridges, top of chest symbol. Brighter gold over the darker Retributor base.'},
      {n:3, paint:'Cryptek Armourshade Gloss', where:'thin wash over ALL gold areas. The GLOSS finish makes the gold look rich and polished. Apply thinly — don\'t let it pool on flat gold surfaces or it will look splotchy.'}
    ];
    case 'G': return [
      {n:1, paint:'Wyldwood', where:'apply this Contrast paint to the TABARD/LOINCLOTH (the hanging cloth between the legs). Let it pool naturally in the folds — Contrast paint does the shading for you.'},
      {n:2, paint:'Basilicanum Grey', where:'apply to BELT, ARM WRAPS, and any secondary leather straps. Another Contrast paint — let it pool in folds.'},
      {n:3, paint:'Administratum Grey', where:'layer highlight on the TOP OF CLOTH FOLDS — the highest raised points of the tabard and strap edges. Only touch the very top of each fold.'}
    ];
    case 'I': return [
      {n:1, paint:'Iron Hands Steel', where:'paint BLADE EDGES and weapon blades (non-energy parts). This is a brighter, different metallic tone from the body\'s Leadbelcher, making weapons look like polished steel.'}
    ];
    case 'P': return [
      {n:1, paint:'Abaddon Black', where:'base coat the entire psychic projection solid black — the glitching/pixelated holographic shape on the right side of the model.'},
      {n:2, paint:'Kantor Blue', where:'base coat the main body of the projection with this dark blue. Leave black visible in the deepest recesses between the pixel blocks.'},
      {n:3, paint:'Teclis Blue', where:'layer the RAISED SURFACES of the projection — the outer faces of each pixel block, the more prominent features of the ghostly face.'},
      {n:4, paint:'Lothern Blue', where:'highlight the EDGES and sharpest features of the projection. The pixel block edges should be brighter than the faces. Creates the holographic "glow" effect.'},
      {n:5, paint:'Corax White', where:'brightest points only — the very tips of the most prominent features, the face features (eyes, mouth) of the projection. Makes it look like the projection is emitting light.'}
    ];
    case 'K': return [
      {n:1, paint:'Leadbelcher', where:'base coat the ENTIRE canoptek cloak — the spider-like body and all mechanical legs underneath the Cryptek.'},
      {n:2, paint:'Nuln Oil', where:'HEAVY wash all over the cloak — use more than you would on the Cryptek body. The cloak should be noticeably DARKER than the Cryptek, making it look like a separate mechanical creature.'},
      {n:3, paint:'Mechanicus Std Grey', where:'DRYBRUSH the raised areas of the cloak — carapace plates, leg joints, mechanical details. Drybrushing picks up the texture and mechanical detail beautifully.'},
      {n:4, paint:'Stormhost Silver', where:'edge highlight the CLAW TIPS and sharp leg joint edges. Makes the cloak look dangerous and metallic.'}
    ];
    case 'S': return [
      {n:1, paint:'Rakarth Flesh', where:'base coat ALL the flayed skin surfaces — the draped flesh hanging off shoulders, chest, back, and dangling strips. This pale bone-white is the starting point for dead skin.'},
      {n:2, paint:'Reikland Fleshshade', where:'wash into ALL SKIN FOLDS and edges where flesh meets metal. Creates natural-looking depth and warmth in the skin.'},
      {n:3, paint:'Flayed One Flesh', where:'layer the RAISED SURFACES of the skin — the stretched areas, the smooth outer face of hanging strips. Leave the shaded recesses darker.'},
      {n:4, paint:'Pallid Wych Flesh', where:'fine highlight on the HIGHEST POINTS of stretched skin — sickly pale, almost white. Top edges of shoulder drapes, stretched knuckles.'},
      {n:5, paint:'Druchii Violet', where:'thin glaze on the EDGES where skin meets metal — creates a bruised, damaged look. Also along torn edges of hanging skin strips. Subtle purple-ish tint.'}
    ];
    case 'T': return [
      {n:1, paint:'Blood for the Blood God', where:'apply to CLAW TIPS, finger blades, and torn skin edges. This is a glossy technical paint that looks like wet blood. Dab it on — let it run and pool naturally. Apply LAST after everything else is done so the glossy finish doesn\'t get messed up.'}
    ];
    case 'X': return [
      {n:1, paint:'Corax White', where:'base coat the ENTIRE ethereal body — torso, limbs, face. This is NOT metallic like other Necrons — the C\'tan has a pale, ghostly body.'},
      {n:2, paint:'Mechanicus Std Grey', where:'shade the DEEPEST RECESSES — muscle definition, joint areas, under arms. Creates the illusion of a gaunt, ethereal form.'},
      {n:3, paint:'Biel-tan Green', where:'glaze over the ENTIRE body to give it an eerie green tint. This makes the C\'tan look otherworldly — not quite alive, not quite dead.'},
      {n:4, paint:'White Scar', where:'highlight the HIGHEST POINTS of muscles and bone structure. Top of shoulders, chest definition, face ridges. Makes it look like the body is glowing from within.'}
    ];
    case 'Y': return [
      {n:1, paint:'Leadbelcher Spray', where:'spray the metallic WING SPINES and mechanical collar/halo. These are the non-living parts of the C\'tan — ancient Necron technology, not the energy body.'},
      {n:2, paint:'Black Templar', where:'Contrast paint over ALL wing/spine surfaces, same technique as Warrior Zone A.'},
      {n:3, paint:'Nuln Oil', where:'wash into recesses of wing joints and mechanical details.'}
    ];
    case 'Z': return [
      {n:1, paint:'Matt Black', where:'base coat ALL energy channels, tendrils, and lightning arcs solid black. There\'s A LOT of green energy on this model — every tendril, every arc between body parts, the sword blade, the base debris connections.'},
      {n:2, paint:'Caliban Green', where:'fill ALL energy areas with dark green — much more coverage than a Warrior eye. Entire tendrils, full sword blade, all arcing connections.'},
      {n:3, paint:'Warpstone Glow', where:'build up brighter green across the centers of all energy — center of each tendril, center of sword blade, brightest points of arcs.'},
      {n:4, paint:'Moot Green', where:'hot centers of the most intense energy points — where tendrils connect to the body, the core chest orb, sword tip, base energy sources.'},
      {n:5, paint:'White dot', where:'pinprick white highlights at the absolute hottest points — center of chest orb, tips of fingers where energy arcs, sword tip.'},
      {n:6, paint:'Biel-tan Green', where:'glaze ALL green areas to unify. Consider Vallejo Fluorescent Green for extra pop on this model specifically.'},
      {n:7, paint:'Casandora Yellow', where:'dab at the hottest energy points for a yellow-white heat effect. Chest core center, sword tip, brightest tendril junctions.'}
    ];
    default: return [];
  }
}

function getModelZones(model) {
  const zones = [];
  if (model.name === 'Canoptek Scarab Swarms') {
    // Speed paint — custom zone list
    return [{
      id: 'SP',
      name: 'Speed Paint Recipe',
      color: '#555',
      steps: [
        {n:1, paint:'Leadbelcher Spray', where:'prime entire swarm black, then spray'},
        {n:2, paint:'Nuln Oil', where:'wash all over'},
        {n:3, paint:'Stormhost Silver', where:'edge highlight carapace plates'},
        {n:4, paint:'Moot Green', where:'tiny eye dots'},
        {n:5, paint:'Moon Dust', where:'base'}
      ]
    }];
  }
  if (model.name === "C'tan Void Dragon") {
    zones.push({id:'X', name:ZONE_NAMES.X, color:ZONE_COLORS.X, steps:getZoneSteps('X',model)});
    zones.push({id:'Y', name:ZONE_NAMES.Y, color:ZONE_COLORS.Y, steps:getZoneSteps('Y',model)});
    zones.push({id:'Z', name:ZONE_NAMES.Z, color:ZONE_COLORS.Z, steps:getZoneSteps('Z',model)});
    zones.push({id:'E', name:ZONE_NAMES.E, color:ZONE_COLORS.E, steps:getZoneSteps('E',model)});
    return zones;
  }
  // Standard zones A-E
  ['A','B','C','D','E'].forEach(z => {
    zones.push({id:z, name:ZONE_NAMES[z], color:ZONE_COLORS[z], steps:getZoneSteps(z,model)});
  });
  // Extra zones for overlord/custom
  if (model.extraZones) {
    model.extraZones.forEach(z => {
      zones.push({id:z, name:ZONE_NAMES[z], color:ZONE_COLORS[z], steps:getZoneSteps(z,model)});
    });
  }
  return zones;
}

function renderSwatch(paint) {
  const c = PAINT_SWATCHES[paint] || '#ccc';
  return `<span class="swatch" style="background:${c}"></span>`;
}

function renderZoneBlock(zone) {
  const letterBg = zone.color || '#555';
  const textColor = ['#d0d0d0','#e8e8e8','#d4b896','#c4a96a','#ffffff'].includes(letterBg) ? '#222' : '#fff';
  let html = `<div class="zone-block">`;
  html += `<div class="zone-title">`;
  html += `<span class="zone-letter" style="background:${letterBg};color:${textColor}">${zone.id}</span>`;
  html += `<span>${zone.name}</span></div>`;
  html += `<ul class="step-list">`;
  zone.steps.forEach(s => {
    html += `<li>`;
    html += `<div class="step-head"><span class="step-num">${s.n}.</span>${renderSwatch(s.paint)}<span class="step-paint">${s.paint}</span></div>`;
    html += `<div class="step-where">${s.where}</div>`;
    html += `</li>`;
  });
  html += `</ul></div>`;
  return html;
}

function renderCard(model) {
  const schemeLabels = {
    warrior: 'Warrior Scheme',
    overlord: 'Overlord Scheme',
  };
  const schemeDescs = {
    warrior: 'Dark metallic body + bronze trim + silver edges + green glow + base. The standard Szarekhan recipe used by most infantry and vehicles.',
    overlord: 'Full Warrior scheme PLUS gold rank details (crown, chest, trim), cloth/robes, and polished steel on weapons. Used by characters and leaders.',
  };
  const schemeLabel = schemeLabels[model.scheme] || (model.customLabel || 'Custom');
  const schemeDesc = schemeDescs[model.scheme] || model.customDesc || '';
  const schemeClass = model.scheme === 'warrior' ? 'tag-warrior' :
                      model.scheme === 'overlord' ? 'tag-overlord' : 'tag-custom';
  const ownerClass = model.ownership === 'OWN' ? 'tag-own' : 'tag-buy';

  const zones = getModelZones(model);

  let html = `<div class="model-page">`;
  // Header
  html += `<div class="model-header">`;
  html += `<div class="model-name">${model.name}</div>`;
  html += `<div class="model-meta">`;
  html += `<span class="meta-item">${model.pts}pts</span>`;
  html += `<span class="meta-item">${model.count} model${model.count>1?'s':''}</span>`;
  html += `<span class="tag ${schemeClass}">${schemeLabel}</span>`;
  html += `<span class="tag ${ownerClass}">${model.ownership}</span>`;
  if (schemeDesc) {
    html += `<div style="font-size:7.5pt;color:#666;margin-top:4px;max-width:600px;margin-left:auto;margin-right:auto;font-style:italic;">${schemeDesc}</div>`;
  }
  html += `</div></div>`;

  // Image with zone dots
  html += `<div class="model-image"><div class="img-container"><img src="${IMG_BASE}${model.img}" alt="${model.name}">${renderDots(model.name)}</div></div>`;

  // Glow note
  if (model.glowNote) {
    html += `<div class="glow-note"><strong>Green Glow Notes:</strong> ${model.glowNote}</div>`;
  }

  // Zones
  html += `<div class="zones" style="margin-top:6px">`;
  zones.forEach(z => { html += renderZoneBlock(z); });
  html += `</div>`;

  // Checklist
  html += `<div class="checklist">`;
  ['Built','Primed','Painted','Based','Done'].forEach(s => {
    html += `<label><span class="check-box"></span> ${s}</label>`;
  });
  html += `</div>`;

  html += `</div>`;
  return html;
}

// Render all
document.addEventListener('DOMContentLoaded', () => {
  document.body.innerHTML = models.map(renderCard).join('');
});
</script>

</body>
</html>
